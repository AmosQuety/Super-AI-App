<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're offline — Xemora</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0D1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      padding: 2rem;
      text-align: center;
    }

    .icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #1f2937 0%, #111827 100%);
      border: 1px solid #30363d;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 2rem;
      font-size: 2.5rem;
    }

    h1 {
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }

    p {
      color: #8b949e;
      font-size: 1rem;
      line-height: 1.6;
      max-width: 36ch;
      margin: 0 auto 2.5rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
      color: #fff;
      text-decoration: none;
      border-radius: 0.75rem;
      font-weight: 600;
      font-size: 0.95rem;
      border: none;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .status {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: #484f58;
    }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #da3633;
      border-radius: 50%;
      margin-right: 0.4rem;
      vertical-align: middle;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're offline</h1>
  <p>
    No internet connection detected. Your last session is cached and your queued
    messages will send automatically when you reconnect.
  </p>
  <button class="btn" onclick="window.location.reload()">
    ↻ Try again
  </button>
  <p class="status">
    <span class="dot"></span>Waiting for connection…
  </p>
  <script>
    // Auto-reload when the connection is restored
    window.addEventListener('online', () => window.location.reload());
  </script>
</body>
</html>

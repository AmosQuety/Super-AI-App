name: Keep Services Alive

on:
  schedule:
    # Run every 14 minutes (Render sleeps at 15m)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows you to run it manually button

jobs:
  ping_services:
    runs-on: ubuntu-latest
    env:
      RENDER_HEALTH_URL: ${{ vars.RENDER_HEALTH_URL }}
      HF_SPACE_URL: ${{ vars.HF_SPACE_URL }}
      FRONTEND_URL: ${{ vars.FRONTEND_URL }}
    steps:
      - name: Wake up Node Backend (Render) & Supabase
        run: |
          # Pinging the /health endpoint.
          # Since our /health endpoint runs "SELECT 1", this keeps Supabase awake too!
          if [ -z "$RENDER_HEALTH_URL" ]; then
            echo "Skipping Render ping: RENDER_HEALTH_URL is not configured."
            exit 0
          fi

          if ! curl -fsSLI --connect-timeout 10 --max-time 120 --retry 2 --retry-delay 5 --retry-all-errors "$RENDER_HEALTH_URL"; then
            echo "Render ping failed after retries (likely cold start or transient network issue)."
          fi
          echo "Pung Render Backend"

      - name: Wake up Python Brain (Hugging Face)
        run: |
          # Pinging the root endpoint
          if [ -z "$HF_SPACE_URL" ]; then
            echo "Skipping Hugging Face ping: HF_SPACE_URL is not configured."
            exit 0
          fi

          if ! curl -fsSLI --connect-timeout 10 --max-time 120 --retry 2 --retry-delay 5 --retry-all-errors "$HF_SPACE_URL"; then
            echo "Hugging Face ping failed after retries."
          fi
          echo "Pung Hugging Face"

      - name: Wake up Frontend (Vercel)
        run: |
          # Keeps Vercel edge cache warm
          FRONTEND_TARGET="${FRONTEND_URL:-https://prism-vision.vercel.app/}"

          if [ -z "$FRONTEND_TARGET" ]; then
            echo "Skipping Vercel ping: no frontend URL is available."
            exit 0
          fi

          if ! curl -fsSLI --connect-timeout 10 --max-time 120 --retry 2 --retry-delay 5 --retry-all-errors "$FRONTEND_TARGET"; then
            echo "Vercel ping failed after retries."
          fi
          echo "Pung Vercel Frontend"
